# check_disk/tasks/windows.yml
# Windows 磁碟巡檢 via SSH - 用簡化的 PowerShell 避免 $_ 轉義問題

- name: Windows - Get disk info
  raw: 'powershell -Command "$disks = Get-WmiObject Win32_LogicalDisk -Filter ''DriveType=3''; $result = @(); foreach($d in $disks){ $pct = [math]::Round(($d.Size - $d.FreeSpace) / $d.Size * 100, 0); $result += @{DeviceID=$d.DeviceID; Size=[math]::Round($d.Size/1GB,1); Used=[math]::Round(($d.Size-$d.FreeSpace)/1GB,1); Free=[math]::Round($d.FreeSpace/1GB,1); Percent=$pct} }; $result | ConvertTo-Json"'
  register: win_disk_raw
  changed_when: false
  ignore_errors: yes

- name: Windows - Parse disk
  set_fact:
    _win_disks_parsed: "{{ win_disk_raw.stdout | trim | from_json }}"
  when: win_disk_raw is succeeded and win_disk_raw.stdout | trim != ''

- name: Windows - Normalize to list
  set_fact:
    _win_disks: "{{ [_win_disks_parsed] if _win_disks_parsed is mapping else _win_disks_parsed | default([]) }}"

- name: Windows - Build partitions
  set_fact:
    parsed_partitions: "{{ parsed_partitions | default([]) + [{'mount': item.DeviceID, 'size': (item.Size | string) + 'G', 'used': (item.Used | string) + 'G', 'free': (item.Free | string) + 'G', 'percent': item.Percent | int, 'status': 'error' if (item.Percent | int) >= (disk_crit | int) else 'warn' if (item.Percent | int) >= (disk_warn | int) else 'ok'}] }}"
  loop: "{{ _win_disks | default([]) }}"
  loop_control:
    label: "{{ item.DeviceID | default('?') }}"

- name: Windows - Set disk result
  set_fact:
    disk_result:
      status: >-
        {{ 'error' if parsed_partitions | default([]) | selectattr('status', 'eq', 'error') | list | length > 0
           else 'warn' if parsed_partitions | default([]) | selectattr('status', 'eq', 'warn') | list | length > 0
           else 'ok' }}
      warn_threshold: "{{ disk_warn }}"
      crit_threshold: "{{ disk_crit }}"
      partitions: "{{ parsed_partitions | default([]) }}"
