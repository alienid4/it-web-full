# check_error_log/tasks/windows.yml
# Windows 事件檢視器 via SSH

- name: Windows - Get system errors
  raw: 'powershell -Command "try{$evts=Get-WinEvent -FilterHashtable @{LogName=''System'';Level=1,2,3;StartTime=(Get-Date).AddHours(-24)} -MaxEvents 50 -EA Stop; $r=@(); foreach($e in $evts){$lv=switch($e.Level){1{''crit''}2{''error''}3{''warn''}default{''info''}}; $msg=$e.Message; if($msg.Length -gt 150){$msg=$msg.Substring(0,150)}; $r+=@{time=$e.TimeCreated.ToString(''HH:mm:ss'');level=$lv;message=$msg}}; $ec=($r|Where-Object{$_.level -in @(''error'',''crit'')}).Count; $wc=($r|Where-Object{$_.level -eq ''warn''}).Count; @{error_count=$ec;warn_count=$wc;entries=$r}|ConvertTo-Json -Depth 3}catch{@{error_count=0;warn_count=0;entries=@()}|ConvertTo-Json}"'
  register: win_elog_raw
  changed_when: false
  ignore_errors: yes

- name: Windows - Parse
  set_fact:
    _we: "{{ (win_elog_raw.stdout | trim | from_json) if win_elog_raw is succeeded and win_elog_raw.stdout | trim != '' and win_elog_raw.stdout | trim | first == '{' else {'error_count':0,'warn_count':0,'entries':[]} }}"

- name: Windows - Set error log result
  set_fact:
    error_log_result:
      status: "{{ 'error' if (_we.error_count | default(0) | int) > 0 else 'warn' if (_we.warn_count | default(0) | int) > 0 else 'ok' }}"
      error_count: "{{ _we.error_count | default(0) }}"
      warn_count: "{{ _we.warn_count | default(0) }}"
      log_file: "Windows Event Log (System)"
      entries: "{{ _we.entries | default([]) }}"
