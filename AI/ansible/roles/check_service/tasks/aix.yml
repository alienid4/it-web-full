---
- name: AIX 
  set_fact:
    service_check_list: >-
      {{ service_check_list
         | map('regex_replace', '^rsyslog$', 'syslogd')
         | map('regex_replace', '^chronyd$', 'xntpd')
         | list }}

- name:  AIX  (lssrc)
  shell: "lssrc -s {{ item }} 2>&1 | awk 'NR==2{print $NF}'"
  register: svc_check
  loop: "{{ service_check_list }}"
  ignore_errors: true
  changed_when: false

- name: 
  set_fact:
    _svc_list: []

- name: 
  set_fact:
    _svc_list: >-
      {{ _svc_list + [{'name': item.item,
         'state': item.stdout | default('unknown') | trim,
         'status': 'ok' if (item.stdout | default('') | trim) == 'active' else 'error'}] }}
  loop: "{{ svc_check.results }}"
  no_log: true

- name: 
  set_fact:
    service_result:
      status: >-
        {{ 'error' if _svc_list | selectattr('status', 'eq', 'error') | list | length > 0
           else 'ok' }}
      services: "{{ _svc_list }}"
      os: "AIX"
