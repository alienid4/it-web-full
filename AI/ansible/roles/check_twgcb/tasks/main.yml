---
# TWGCB 合規檢查 - Linux (8 項測試)

# A-01: 禁止 IP 轉發
- name: "TWGCB-01-008-0108 Check ip_forward"
  shell: cat /proc/sys/net/ipv4/ip_forward 2>/dev/null
  register: check_ip_forward
  changed_when: false
  ignore_errors: true
  become: true

# A-09: /etc/crontab 權限
- name: "TWGCB-01-008-0194 Check crontab permission"
  shell: stat -c '%a' /etc/crontab 2>/dev/null || echo 'NOT_FOUND'
  register: check_crontab_perm
  changed_when: false
  ignore_errors: true
  become: true

# A-15: /etc/cron.allow 存在
- name: "TWGCB-01-008-0205 Check cron.allow"
  shell: |
    if [ -f /etc/cron.allow ]; then
      content=$(cat /etc/cron.allow | tr '\n' ',')
      echo "exists|${content}"
    else
      echo "missing|"
    fi
  register: check_cron_allow
  changed_when: false
  ignore_errors: true
  become: true

# A-18: /etc/issue 登入橫幅
- name: "TWGCB-01-008-0039 Check login banner"
  shell: |
    if [ -f /etc/issue ]; then
      content=$(cat /etc/issue)
      if echo "$content" | grep -qiE 'authorized|warning|unauthorized|警告|未經授權'; then
        echo "configured|${content}"
      elif echo "$content" | grep -qE '\\\\S|\\\\r|\\\\m|\\\\l'; then
        echo "os_info_leak|${content}"
      else
        echo "no_warning|${content}"
      fi
    else
      echo "missing|"
    fi
  register: check_banner
  changed_when: false
  ignore_errors: true
  become: true

# A-21: Core Dump 限制
- name: "TWGCB-01-008-0042 Check core dump"
  shell: |
    result=""
    # Check limits.conf and limits.d
    if grep -rq 'hard.*core.*0' /etc/security/limits.conf /etc/security/limits.d/ 2>/dev/null; then
      result="restricted"
    else
      result="unrestricted"
    fi
    suid=$(sysctl -n fs.suid_dumpable 2>/dev/null || echo "unknown")
    echo "${result}|suid_dumpable=${suid}"
  register: check_core_dump
  changed_when: false
  ignore_errors: true
  become: true

# B-03: SSH MaxAuthTries
- name: "TWGCB-01-008-0274 Check SSH MaxAuthTries"
  shell: sshd -T 2>/dev/null | grep -i maxauthtries | awk '{print $2}'
  register: check_ssh_maxauth
  changed_when: false
  ignore_errors: true
  become: true

# B-04: SSH IgnoreRhosts
- name: "TWGCB-01-008-0275 Check SSH IgnoreRhosts"
  shell: sshd -T 2>/dev/null | grep -i '^ignorerhosts' | awk '{print $2}'
  register: check_ssh_ignorerhosts
  changed_when: false
  ignore_errors: true
  become: true

# B-05: SSH PermitEmptyPasswords
- name: "TWGCB-01-008-0278 Check SSH PermitEmptyPasswords"
  shell: sshd -T 2>/dev/null | grep -i '^permitemptypasswords' | awk '{print $2}'
  register: check_ssh_permitempty
  changed_when: false
  ignore_errors: true
  become: true

# B-06: SSH ClientAliveInterval
- name: "TWGCB-01-008-0280a Check SSH ClientAliveInterval"
  shell: sshd -T 2>/dev/null | grep -i '^clientaliveinterval' | awk '{print $2}'
  register: check_ssh_alive_interval
  changed_when: false
  ignore_errors: true
  become: true

# B-07: SSH ClientAliveCountMax
- name: "TWGCB-01-008-0280b Check SSH ClientAliveCountMax"
  shell: sshd -T 2>/dev/null | grep -i '^clientalivecountmax' | awk '{print $2}'
  register: check_ssh_alive_countmax
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check pwquality retry"
  shell: |
    { cat /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null; } | grep -E '^[[:space:]]*retry[[:space:]]*=' | tail -1 | awk -F= '{print $2}' | tr -d ' '
  register: check_pw_retry
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check pwquality minlen"
  shell: |
    { cat /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null; } | grep -E '^[[:space:]]*minlen[[:space:]]*=' | tail -1 | awk -F= '{print $2}' | tr -d ' '
  register: check_pw_minlen
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check pwquality dcredit"
  shell: |
    { cat /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null; } | grep -E '^[[:space:]]*dcredit[[:space:]]*=' | tail -1 | awk -F= '{print $2}' | tr -d ' '
  register: check_pw_dcredit
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check pwquality ucredit"
  shell: |
    { cat /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null; } | grep -E '^[[:space:]]*ucredit[[:space:]]*=' | tail -1 | awk -F= '{print $2}' | tr -d ' '
  register: check_pw_ucredit
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check pwquality lcredit"
  shell: |
    { cat /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null; } | grep -E '^[[:space:]]*lcredit[[:space:]]*=' | tail -1 | awk -F= '{print $2}' | tr -d ' '
  register: check_pw_lcredit
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check pwquality ocredit"
  shell: |
    { cat /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null; } | grep -E '^[[:space:]]*ocredit[[:space:]]*=' | tail -1 | awk -F= '{print $2}' | tr -d ' '
  register: check_pw_ocredit
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check pwquality difok"
  shell: |
    { cat /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null; } | grep -E '^[[:space:]]*difok[[:space:]]*=' | tail -1 | awk -F= '{print $2}' | tr -d ' '
  register: check_pw_difok
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check pwquality maxclassrepeat"
  shell: |
    { cat /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null; } | grep -E '^[[:space:]]*maxclassrepeat[[:space:]]*=' | tail -1 | awk -F= '{print $2}' | tr -d ' '
  register: check_pw_maxclassrepeat
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check pwquality maxrepeat"
  shell: |
    { cat /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null; } | grep -E '^[[:space:]]*maxrepeat[[:space:]]*=' | tail -1 | awk -F= '{print $2}' | tr -d ' '
  register: check_pw_maxrepeat
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check pwquality dictcheck"
  shell: |
    { cat /etc/security/pwquality.conf /etc/security/pwquality.conf.d/*.conf 2>/dev/null; } | grep -E '^[[:space:]]*dictcheck[[:space:]]*=' | tail -1 | awk -F= '{print $2}' | tr -d ' '
  register: check_pw_dictcheck
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check faillock deny"
  shell: |
    { cat /etc/security/faillock.conf 2>/dev/null; } | grep -E '^[[:space:]]*deny[[:space:]]*=' | tail -1 | awk -F= '{print $2}' | tr -d ' '
  register: check_faillock_deny
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check faillock unlock_time"
  shell: |
    { cat /etc/security/faillock.conf 2>/dev/null; } | grep -E '^[[:space:]]*unlock_time[[:space:]]*=' | tail -1 | awk -F= '{print $2}' | tr -d ' '
  register: check_faillock_unlock
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check PASS_MIN_DAYS"
  shell: grep -E '^[[:space:]]*PASS_MIN_DAYS' /etc/login.defs | awk '{print $2}'
  register: check_pass_min_days
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check pam_pwhistory remember"
  shell: |
    grep -rhE 'pam_pwhistory\.so' /etc/pam.d/ 2>/dev/null | grep -oE 'remember=[0-9]+' | head -1 | cut -d= -f2
  register: check_pw_history
  changed_when: false
  ignore_errors: true
  become: true

# === Batch 3: Audit + Logging (16 項) ===
- name: "Check auditd installed"
  shell: (command -v auditctl >/dev/null && command -v auditd >/dev/null) && echo yes || echo no
  register: chk_auditd_installed
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check auditd enabled"
  shell: systemctl is-enabled auditd 2>&1 | head -1
  register: chk_auditd_enabled
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check auditd.conf owner"
  shell: stat -c '%U:%G' /etc/audit/auditd.conf 2>/dev/null || echo missing
  register: chk_auditd_conf_owner
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check audit.log perm"
  shell: stat -c '%a' /var/log/audit/audit.log 2>/dev/null || echo missing
  register: chk_audit_log_perm
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check audit log dir owner"
  shell: stat -c '%U:%G' /var/log/audit 2>/dev/null || echo missing
  register: chk_audit_dir_owner
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check audit log dir perm"
  shell: stat -c '%a' /var/log/audit 2>/dev/null || echo missing
  register: chk_audit_dir_perm
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check audit rules perm"
  shell: stat -c '%a' /etc/audit/rules.d 2>/dev/null || echo missing
  register: chk_audit_rules_perm
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check auditd.conf perm"
  shell: stat -c '%a' /etc/audit/auditd.conf 2>/dev/null || echo missing
  register: chk_auditd_conf_perm
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check audit tool owner"
  shell: |
    for f in /sbin/auditctl /sbin/auditd /usr/sbin/auditctl /usr/sbin/auditd; do
      [ -f "$f" ] && stat -c '%U:%G' "$f" && exit
    done
    echo missing
  register: chk_audit_tool_owner
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check audit login rules"
  shell: auditctl -l 2>/dev/null | grep -cE '/var/log/lastlog|/var/run/faillock' || true
  register: chk_audit_login
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check pam_faillock enabled"
  shell: grep -rh 'pam_faillock' /etc/pam.d/ 2>/dev/null | grep -c '^auth' || true
  register: chk_pam_faillock
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check rsyslog installed"
  shell: command -v rsyslogd >/dev/null && echo yes || echo no
  register: chk_rsyslog_installed
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check rsyslog enabled"
  shell: systemctl is-enabled rsyslog 2>&1 | head -1
  register: chk_rsyslog_enabled
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check rsyslog rules"
  shell: grep -rhE '^(auth,authpriv|\*\.\*|authpriv\.)' /etc/rsyslog.conf /etc/rsyslog.d/ 2>/dev/null | wc -l
  register: chk_rsyslog_rules
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check messages owner"
  shell: |
    for f in /var/log/messages /var/log/syslog; do
      [ -f "$f" ] && stat -c '%U:%G' "$f" && exit
    done
    echo missing
  register: chk_messages_owner
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check /var/log dir owner"
  shell: stat -c '%U:%G' /var/log 2>/dev/null
  register: chk_varlog_owner
  changed_when: false
  ignore_errors: true
  become: true

# === Batch 4: System Hardening (7 項) ===
- name: "Check /bin perms"
  shell: stat -c '%a' /usr/bin 2>/dev/null
  register: chk_bin_perm
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check systemd ctrl-alt-del disabled"
  shell: systemctl is-enabled ctrl-alt-del.target 2>&1 | head -1
  register: chk_cad_sysd
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check systemd ctrl-alt-del target"
  shell: systemctl show ctrl-alt-del.target -p LoadState,UnitFileState 2>/dev/null | grep -E 'masked|not-found' | head -1 | cut -d= -f2
  register: chk_cad_target
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check chrony port"
  shell: |
    for f in /etc/chrony.conf /etc/chrony/chrony.conf; do
      [ -f "$f" ] && grep -E '^[[:space:]]*port[[:space:]]' "$f" | awk '{print $2}' && exit
    done
    echo unset
  register: chk_chrony_port
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check chrony cmdport"
  shell: |
    for f in /etc/chrony.conf /etc/chrony/chrony.conf; do
      [ -f "$f" ] && grep -E '^[[:space:]]*cmdport[[:space:]]' "$f" | awk '{print $2}' && exit
    done
    echo unset
  register: chk_chrony_cmdport
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check chronyd not root"
  shell: |
    pgrep -af chronyd | grep -vE 'grep|pgrep' | head -1 | awk '{print $1}' | xargs -I{} ps -o user= -p {} 2>/dev/null || echo unknown
  register: chk_chronyd_user
  changed_when: false
  ignore_errors: true
  become: true

- name: "Check sendmail not installed"
  # 用 exit code 判斷，避免中文 locale 下 rpm/dpkg 的訊息文字被 grep 誤判
  shell: |
    if rpm -q sendmail >/dev/null 2>&1; then
      echo installed
    elif dpkg -l sendmail 2>/dev/null | grep -q '^ii '; then
      echo installed
    else
      echo notinstalled
    fi
  register: chk_sendmail
  changed_when: false
  ignore_errors: true

# C-01: 密碼最長使用天數
- name: "TWGCB-01-008-0227 Check PASS_MAX_DAYS"
  shell: grep '^PASS_MAX_DAYS' /etc/login.defs | awk '{print $2}'
  register: check_pass_max_days
  changed_when: false
  ignore_errors: true
  become: true

# D-08: Audit 帳號修改規則
- name: "TWGCB-01-008-0156 Check audit account rules"
  shell: |
    rules=$(auditctl -l 2>/dev/null)
    has_passwd=$(echo "$rules" | grep -c '/etc/passwd' || true)
    has_shadow=$(echo "$rules" | grep -c '/etc/shadow' || true)
    if [ "$has_passwd" -gt 0 ] && [ "$has_shadow" -gt 0 ]; then
      echo "configured|passwd=${has_passwd},shadow=${has_shadow}"
    elif [ "$has_passwd" -gt 0 ] || [ "$has_shadow" -gt 0 ]; then
      echo "partial|passwd=${has_passwd},shadow=${has_shadow}"
    else
      echo "missing|no_rules"
    fi
  register: check_audit_account
  changed_when: false
  ignore_errors: true
  become: true

# 彙整結果
- name: "Compile TWGCB results"
  set_fact:
    twgcb_result:
      hostname: "{{ inventory_hostname }}"
      scan_time: "{{ ansible_date_time.iso8601 | default('') }}"
      # 變更 #46: ansible_distribution 在某些 Debian 版本下 gather 不到 → 加 default 避免 playbook fatal
      os: "{{ ansible_distribution | default('Linux') }} {{ ansible_distribution_version | default('') }}"
      checks:
        - id: "TWGCB-01-008-0108"
          category: "網路參數"
          name: "禁止 IP 轉發 (ip_forward=0)"
          level: "A"
          expected: "0"
          actual: "{{ check_ip_forward.stdout | default('unknown') | trim }}"
          status: "{{ 'PASS' if (check_ip_forward.stdout | default('') | trim) == '0' else 'FAIL' }}"
          detail: "net.ipv4.ip_forward = {{ check_ip_forward.stdout | default('unknown') | trim }}"
          remediation: 'F=/etc/sysctl.d/99-twgcb.conf; mkdir -p /etc/sysctl.d; touch $F; sed -i -E ''/^[[:space:]]*#?[[:space:]]*net\.ipv4\.ip_forward[[:space:]]*=/d'' $F; echo ''net.ipv4.ip_forward = 0'' >> $F; echo 0 > /proc/sys/net/ipv4/ip_forward; echo OK'
        - id: "TWGCB-01-008-0194"
          category: "檔案權限"
          name: "/etc/crontab 權限正確"
          level: "A"
          expected: "600"
          actual: "{{ check_crontab_perm.stdout | default('unknown') | trim }}"
          status: "{{ 'PASS' if (check_crontab_perm.stdout | default('') | trim) == '600' else 'FAIL' }}"
          detail: "目前權限 {{ check_crontab_perm.stdout | default('unknown') | trim }}"
          remediation: "chmod 600 /etc/crontab"
        - id: "TWGCB-01-008-0205"
          category: "存取控制"
          name: "/etc/cron.allow 存在且可用"
          level: "A"
          expected: "exists"
          actual: "{{ (check_cron_allow.stdout | default('missing|')).split('|')[0] }}"
          status: "{{ 'PASS' if (check_cron_allow.stdout | default('missing|')).split('|')[0] == 'exists' else 'FAIL' }}"
          detail: "{{ check_cron_allow.stdout | default('missing|') }}"
          remediation: "echo root > /etc/cron.allow && chmod 600 /etc/cron.allow"
        - id: "TWGCB-01-008-0039"
          category: "登入橫幅"
          name: "/etc/issue 警告橫幅內容"
          level: "A"
          expected: "configured"
          actual: "{{ (check_banner.stdout | default('missing|')).split('|')[0] }}"
          status: "{{ 'PASS' if (check_banner.stdout | default('missing|')).split('|')[0] == 'configured' else 'FAIL' }}"
          detail: "{{ (check_banner.stdout | default('missing|')).split('|')[0] }}"
          remediation: "echo 'Authorized users only. All activity may be monitored.' > /etc/issue"
        - id: "TWGCB-01-008-0042"
          category: "日誌與安全"
          name: "禁止 Core Dump 產生"
          level: "A"
          expected: "restricted"
          actual: "{{ (check_core_dump.stdout | default('unrestricted|')).split('|')[0] }}"
          status: "{{ 'PASS' if (check_core_dump.stdout | default('unrestricted|')).split('|')[0] == 'restricted' else 'FAIL' }}"
          detail: "{{ check_core_dump.stdout | default('unknown') }}"
          remediation: "echo '* hard core 0' > /etc/security/limits.d/99-twgcb.conf && sysctl -w fs.suid_dumpable=0"
        - id: "TWGCB-01-008-0274"
          category: "SSH 加固"
          name: "SSH 連線最大嘗試次數 (<=4)"
          level: "B"
          expected: "<=4"
          actual: "{{ check_ssh_maxauth.stdout | default('unknown') | trim }}"
          status: "{{ 'PASS' if (check_ssh_maxauth.stdout | default('99') | trim | int) <= 4 else 'FAIL' }}"
          detail: "MaxAuthTries = {{ check_ssh_maxauth.stdout | default('unknown') | trim }}"
          remediation: 'SVC=sshd; systemctl list-unit-files sshd.service 2>/dev/null | grep -q ''^sshd\.service'' || SVC=ssh; grep -qE ''^[[:space:]]*Include[[:space:]]+/etc/ssh/sshd_config\.d'' /etc/ssh/sshd_config || sed -i ''1i Include /etc/ssh/sshd_config.d/*.conf'' /etc/ssh/sshd_config; mkdir -p /etc/ssh/sshd_config.d; chmod 0755 /etc/ssh/sshd_config.d; DROPIN=/etc/ssh/sshd_config.d/99-twgcb.conf; touch $DROPIN; chmod 0644 $DROPIN; cp -p $DROPIN $DROPIN.bak; sed -i -E ''/^[[:space:]]*#?[[:space:]]*MaxAuthTries([[:space:]]|=|$)/d'' $DROPIN; echo ''MaxAuthTries 4'' >> $DROPIN; mkdir -p /run/sshd; chmod 0755 /run/sshd; if ! sshd -t 2>&1; then cp -p $DROPIN.bak $DROPIN; echo ROLLBACK_ON_VALIDATE_FAIL; exit 2; fi; if ! systemctl reload $SVC 2>&1; then if ! systemctl restart $SVC 2>&1; then cp -p $DROPIN.bak $DROPIN; systemctl restart $SVC 2>&1; echo ROLLBACK_ON_RESTART_FAIL; exit 3; fi; fi; sleep 1; if ! systemctl is-active --quiet $SVC; then cp -p $DROPIN.bak $DROPIN; systemctl start $SVC 2>&1; echo ROLLBACK_ON_POST_FAIL; exit 4; fi; echo OK'
        - id: "TWGCB-01-008-0275"
          category: "SSH 加固"
          name: "SSH 忽略 .rhosts 檔案 (IgnoreRhosts=yes)"
          level: "B"
          expected: "yes"
          actual: "{{ check_ssh_ignorerhosts.stdout | default('unknown') | trim }}"
          status: "{{ 'PASS' if (check_ssh_ignorerhosts.stdout | default('') | trim | lower) == 'yes' else 'FAIL' }}"
          detail: "IgnoreRhosts = {{ check_ssh_ignorerhosts.stdout | default('unknown') | trim }}"
          remediation: 'SVC=sshd; systemctl list-unit-files sshd.service 2>/dev/null | grep -q ''^sshd\.service'' || SVC=ssh; grep -qE ''^[[:space:]]*Include[[:space:]]+/etc/ssh/sshd_config\.d'' /etc/ssh/sshd_config || sed -i ''1i Include /etc/ssh/sshd_config.d/*.conf'' /etc/ssh/sshd_config; mkdir -p /etc/ssh/sshd_config.d; chmod 0755 /etc/ssh/sshd_config.d; DROPIN=/etc/ssh/sshd_config.d/99-twgcb.conf; touch $DROPIN; chmod 0644 $DROPIN; cp -p $DROPIN $DROPIN.bak; sed -i -E ''/^[[:space:]]*#?[[:space:]]*IgnoreRhosts([[:space:]]|=|$)/d'' $DROPIN; echo ''IgnoreRhosts yes'' >> $DROPIN; mkdir -p /run/sshd; chmod 0755 /run/sshd; if ! sshd -t 2>&1; then cp -p $DROPIN.bak $DROPIN; echo ROLLBACK_ON_VALIDATE_FAIL; exit 2; fi; if ! systemctl reload $SVC 2>&1; then if ! systemctl restart $SVC 2>&1; then cp -p $DROPIN.bak $DROPIN; systemctl restart $SVC 2>&1; echo ROLLBACK_ON_RESTART_FAIL; exit 3; fi; fi; sleep 1; if ! systemctl is-active --quiet $SVC; then cp -p $DROPIN.bak $DROPIN; systemctl start $SVC 2>&1; echo ROLLBACK_ON_POST_FAIL; exit 4; fi; echo OK'
        - id: "TWGCB-01-008-0278"
          category: "SSH 加固"
          name: "SSH 禁止空密碼登入 (PermitEmptyPasswords=no)"
          level: "B"
          expected: "no"
          actual: "{{ check_ssh_permitempty.stdout | default('unknown') | trim }}"
          status: "{{ 'PASS' if (check_ssh_permitempty.stdout | default('') | trim | lower) == 'no' else 'FAIL' }}"
          detail: "PermitEmptyPasswords = {{ check_ssh_permitempty.stdout | default('unknown') | trim }}"
