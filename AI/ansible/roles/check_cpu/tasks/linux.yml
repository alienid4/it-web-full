---
# v3.11.10.0: 改用 mpstat 優先 + top fallback, 不再依賴 vmstat $15
# (vmstat 在某些環境 tail -1 抓到 header 行, $15 變字串 → 使用率固定 100%)
- name:  CPU 使用率
  shell: |
    set -o pipefail
    if command -v mpstat >/dev/null 2>&1; then
      # mpstat 最後一欄是 %idle, 減 100 得使用率
      LANG=C mpstat 1 1 | awk 'END{v=100-$NF; if(v<0)v=0; print int(v+0.5)}'
    else
      # top -bn1 fallback: 找 "Cpu(s)" 行, 取 id 前的數字
      LANG=C top -bn1 | awk -F'[ ,%]+' '/Cpu\(s\)/ {for(i=1;i<=NF;i++) if($i=="id") {v=100-$(i-1); if(v<0)v=0; print int(v+0.5); exit}}'
    fi
  args:
    executable: /bin/bash
  register: cpu_raw
  changed_when: false

- name:  Memory
  shell: "free -b | awk '/^Mem:/ {printf \"%.0f\", $3/$2*100}'"
  register: mem_raw
  changed_when: false

- name:  CPU/Memory 
  set_fact:
    cpu_result:
      cpu_percent: "{{ cpu_raw.stdout | default('0') | int }}"
      cpu_status: >-
        {{ 'error' if (cpu_raw.stdout | default('0') | int) >= (cpu_error_threshold | default(90))
           else 'warn' if (cpu_raw.stdout | default('0') | int) >= (cpu_warn_threshold | default(80))
           else 'ok' }}
      mem_percent: "{{ mem_raw.stdout | default('0') | int }}"
      mem_status: >-
        {{ 'error' if (mem_raw.stdout | default('0') | int) >= (mem_error_threshold | default(95))
           else 'warn' if (mem_raw.stdout | default('0') | int) >= (mem_warn_threshold | default(85))
           else 'ok' }}
      status: >-
        {{ 'error' if (cpu_raw.stdout | default('0') | int) >= (cpu_error_threshold | default(90))
                   or (mem_raw.stdout | default('0') | int) >= (mem_error_threshold | default(95))
           else 'warn' if (cpu_raw.stdout | default('0') | int) >= (cpu_warn_threshold | default(80))
                       or (mem_raw.stdout | default('0') | int) >= (mem_warn_threshold | default(85))
           else 'ok' }}
