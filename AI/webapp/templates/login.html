<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入 - IT 每日巡檢系統</title>
  <link rel="stylesheet" href="/static/css/example.css?v={{ APP_VER }}">
</head>
<body>
  <div style="display:flex;justify-content:center;align-items:center;min-height:80vh;">
    <div class="card" style="width:100%;max-width:400px;padding:40px;">
      <div style="text-align:center;margin-bottom:24px;">
        <span style="width:12px;height:12px;border-radius:50%;background:var(--g1);display:inline-block;margin-right:8px;"></span>
        <strong style="color:var(--g-text);font-size:16px;">IT 每日巡檢系統</strong>
        <h2 style="font-size:20px;margin-top:8px;">系統管理登入</h2>
      </div>
      <div id="login-error" style="background:#FFEBEE;color:var(--red);padding:8px 12px;border-radius:6px;font-size:13px;display:none;margin-bottom:16px;"></div>
      <div class="form-group">
        <label>帳號</label>
        <input type="text" id="login-user" placeholder="請輸入帳號" autofocus>
      </div>
      <div class="form-group">
        <label>密碼</label>
        <input type="password" id="login-pass" placeholder="請輸入密碼">
      </div>
      <button class="btn btn-primary" style="width:100%;padding:12px;font-size:16px;" onclick="doLogin()">登入</button>
      <div style="display:flex;justify-content:space-between;margin-top:16px;">
        <a href="/" style="color:var(--c3);font-size:13px;text-decoration:none;">返回巡檢首頁</a>
        <a href="/reset-password" style="color:var(--g1);font-size:13px;text-decoration:none;">忘記密碼？</a>
      </div>
    </div>
  </div>
  <script>
  document.getElementById("login-pass").addEventListener("keypress", function(e) {
    if (e.key === "Enter") doLogin();
  });
  function doLogin() {
    var user = document.getElementById("login-user").value;
    var pass = document.getElementById("login-pass").value;
    var errEl = document.getElementById("login-error");
    errEl.style.display = "none";
    fetch("/api/admin/login", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({username: user, password: pass})
    }).then(function(r){return r.json();}).then(function(res) {
      if (res.success) {
        if (res.data.must_change_password) {
          var np = prompt("首次登入請修改密碼：");
          if (np) {
            fetch("/api/admin/change-password", {
              method: "POST",
              headers: {"Content-Type": "application/json"},
              body: JSON.stringify({new_password: np})
            }).then(function(){var next = new URLSearchParams(location.search).get("next") || "/"; location.href = next;});
          }
        } else {
          var next = new URLSearchParams(location.search).get("next") || "/"; location.href = next;
        }
      } else {
        errEl.textContent = res.error || "登入失敗";
        errEl.style.display = "block";
      }
    });
  }
  </script>
</body>
</html>
