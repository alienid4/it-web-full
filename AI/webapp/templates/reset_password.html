<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>重設密碼 - IT 每日巡檢系統</title>
  <link rel="stylesheet" href="/static/css/example.css?v={{ APP_VER }}">
</head>
<body>
  <div style="display:flex;justify-content:center;align-items:center;min-height:80vh;">
    <div class="card" style="width:100%;max-width:400px;padding:40px;">
      <div style="text-align:center;margin-bottom:24px;">
        <span class="dot" style="width:12px;height:12px;border-radius:50%;background:var(--g1);display:inline-block;margin-right:8px;"></span>
        <strong style="color:var(--g-text);font-size:16px;">IT 每日巡檢系統</strong>
        <h2 style="font-size:20px;margin-top:8px;" id="page-title">重設密碼</h2>
      </div>

      <!-- 忘記密碼：輸入帳號 -->
      <div id="step-request">
        <div class="login-error" id="req-error" style="background:#FFEBEE;color:var(--red);padding:8px 12px;border-radius:6px;font-size:13px;display:none;margin-bottom:16px;"></div>
        <div class="login-success" id="req-success" style="background:var(--g-light);color:var(--g-text);padding:8px 12px;border-radius:6px;font-size:13px;display:none;margin-bottom:16px;"></div>
        <div class="form-group">
          <label>帳號</label>
          <input type="text" id="forgot-user" placeholder="請輸入帳號" autofocus>
        </div>
        <button class="btn btn-primary" style="width:100%;padding:12px;font-size:16px;" onclick="requestReset()">寄送重設連結</button>
        <div style="text-align:center;margin-top:16px;">
          <a href="/login" style="color:var(--c3);font-size:13px;text-decoration:none;">返回登入</a>
        </div>
      </div>

      <!-- 重設密碼：輸入新密碼 -->
      <div id="step-reset" style="display:none;">
        <div class="login-error" id="reset-error" style="background:#FFEBEE;color:var(--red);padding:8px 12px;border-radius:6px;font-size:13px;display:none;margin-bottom:16px;"></div>
        <div class="form-group">
          <label>新密碼</label>
          <input type="password" id="new-pass" placeholder="請輸入新密碼（至少 6 字元）">
        </div>
        <div class="form-group">
          <label>確認新密碼</label>
          <input type="password" id="new-pass2" placeholder="再次輸入新密碼">
        </div>
        <button class="btn btn-primary" style="width:100%;padding:12px;font-size:16px;" onclick="doReset()">確認重設</button>
      </div>

      <!-- 完成 -->
      <div id="step-done" style="display:none;text-align:center;">
        <div style="font-size:48px;margin-bottom:16px;">&#10003;</div>
        <p style="font-size:16px;font-weight:600;color:var(--g1);">密碼已重設成功</p>
        <p style="color:var(--c3);margin-top:8px;">請用新密碼登入</p>
        <a href="/login" class="btn btn-primary" style="margin-top:20px;text-decoration:none;">前往登入</a>
      </div>
    </div>
  </div>

  <script>
  var resetToken = new URLSearchParams(location.search).get('token');
  if (resetToken) {
    document.getElementById('step-request').style.display = 'none';
    document.getElementById('step-reset').style.display = 'block';
    document.getElementById('page-title').textContent = '設定新密碼';
  }

  function requestReset() {
    var user = document.getElementById('forgot-user').value.trim();
    var errEl = document.getElementById('req-error');
    var okEl = document.getElementById('req-success');
    errEl.style.display = 'none';
    okEl.style.display = 'none';
    if (!user) { errEl.textContent = '請輸入帳號'; errEl.style.display = 'block'; return; }
    fetch('/api/admin/forgot-password', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username: user})
    }).then(function(r){return r.json();}).then(function(res) {
      if (res.success) {
        okEl.textContent = res.message;
        okEl.style.display = 'block';
      } else {
        errEl.textContent = res.error || '操作失敗';
        errEl.style.display = 'block';
      }
    });
  }

  document.getElementById('forgot-user').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') requestReset();
  });

  function doReset() {
    var p1 = document.getElementById('new-pass').value;
    var p2 = document.getElementById('new-pass2').value;
    var errEl = document.getElementById('reset-error');
    errEl.style.display = 'none';
    if (p1.length < 6) { errEl.textContent = '密碼至少 6 個字元'; errEl.style.display = 'block'; return; }
    if (p1 !== p2) { errEl.textContent = '兩次密碼不一致'; errEl.style.display = 'block'; return; }
    fetch('/api/admin/reset-password', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({token: resetToken, new_password: p1})
    }).then(function(r){return r.json();}).then(function(res) {
      if (res.success) {
        document.getElementById('step-reset').style.display = 'none';
        document.getElementById('step-done').style.display = 'block';
        document.getElementById('page-title').textContent = '重設完成';
      } else {
        errEl.textContent = res.error || '重設失敗';
        errEl.style.display = 'block';
      }
    });
  }

  document.getElementById('new-pass2').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') doReset();
  });
  </script>
</body>
</html>
