<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>系統聯通圖 (全螢幕)</title>
  <link rel="stylesheet" href="/static/css/example.css?v={{ APP_VER }}">
  <style>
    html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #fafafa; }
    .fs-bar { position: fixed; top: 0; left: 0; right: 0; height: 48px; background: rgba(255,255,255,0.95); border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; padding: 0 16px; gap: 8px; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .fs-bar h1 { font-size: 14px; margin: 0 16px 0 0; font-weight: 600; }
    .fs-bar .meta { font-size: 11px; color: #888; font-family: JetBrains Mono, monospace; }
    .fs-canvas { position: absolute; top: 48px; left: 0; right: 360px; bottom: 0; background: #fafafa; }
    .fs-side { position: absolute; top: 48px; right: 0; width: 360px; bottom: 0; background: #fff; border-left: 1px solid #eee; padding: 16px; overflow-y: auto; }
    .fs-side.collapsed { width: 0; padding: 0; overflow: hidden; }
    .fs-canvas.expanded { right: 0; }
    .fs-toggle-side { background: none; border: 1px solid #ccc; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .fs-bar input.dep-search { width: 200px; }
    .fs-bar select.dep-select { font-size: 12px; padding: 4px 8px; }
    .fs-bar .btn { padding: 5px 10px; font-size: 12px; }
  </style>
</head>
<body>
  <div class="fs-bar">
    <h1>🗺️ 系統聯通圖</h1>
    <input type="text" id="dep-search" class="dep-search" placeholder="🔍 搜尋系統 / 主機 / Owner" oninput="depSearch(this.value)" autocomplete="off">
    <select id="dep-view" class="dep-select" onchange="depReload()" title="顯示模式">
      <option value="system" selected>📦 系統別</option>
      <option value="host">🖥️ 主機</option>
      <option value="ip">🌐 IP</option>
    </select>
    <select id="dep-tier-filter" class="dep-select" onchange="depReload()">
      <option value="">全部級別</option>
      <option value="A">A 級</option><option value="B">B 級</option><option value="C">C 級</option>
    </select>
    <select id="dep-depth" class="dep-select" onchange="depReload()">
      <option value="1">深度 1</option><option value="2" selected>深度 2</option><option value="3">深度 3</option><option value="4">深度 4</option>
    </select>
    <button class="btn" onclick="depReload()">🔄</button>
    <button class="btn btn-primary" onclick="depFitView()">🎯 對齊</button>
    <button class="btn" id="dep-simulate-btn" onclick="depSimulateFailure()" disabled title="先選一個節點">⚠️ 模擬故障</button>
    <button class="btn" onclick="depReset()">↺ 重置</button>
    <button class="btn" id="dep-collect-btn" onclick="depTriggerCollect()" title="觸發 ansible 採集 (需 admin)">📡 採集</button>
    <span class="meta" id="dep-meta" style="margin-left:auto;">節點數 — / 邊數 —</span>
    <button class="fs-toggle-side" onclick="toggleSide()">▶</button>
    <button class="btn" onclick="window.close()" title="關閉">✕</button>
  </div>

  <div id="dep-canvas" class="fs-canvas"></div>

  <aside class="fs-side" id="fs-side">
    <div class="dep-side-empty" id="dep-side-empty">
      <div style="font-size:36px;text-align:center;margin-bottom:8px;">👈</div>
      <div style="text-align:center;">點選任一節點查看詳情</div>
      <div style="font-size:12px;color:#888;margin-top:8px;text-align:center;">雙擊節點可展開鄰居</div>
    </div>
    <div class="dep-side-detail" id="dep-side-detail" style="display:none;">
      <div class="dep-side-header">
        <span class="dep-tier-badge" id="dep-detail-tier">A</span>
        <span class="dep-detail-name" id="dep-detail-name">—</span>
      </div>
      <div class="dep-detail-id" id="dep-detail-id">—</div>
      <div class="dep-detail-row"><span>類別</span><span id="dep-detail-category">—</span></div>
      <div class="dep-detail-row"><span>負責人</span><span id="dep-detail-owner">—</span></div>
      <div class="dep-detail-row"><span>主機</span><span id="dep-detail-hosts">—</span></div>
      <div class="dep-detail-desc" id="dep-detail-desc">—</div>
      <div class="dep-detail-impact">
        <div class="dep-impact-block">
          <div class="dep-impact-title">⬆️ 上游影響者</div>
          <div id="dep-detail-upstream" class="dep-impact-list">—</div>
        </div>
        <div class="dep-impact-block">
          <div class="dep-impact-title">⬇️ 下游受災者</div>
          <div id="dep-detail-downstream" class="dep-impact-list">—</div>
        </div>
      </div>
      <div class="dep-side-actions">
        <button class="btn btn-sm" onclick="depExpandNeighbors()">🔍 展開鄰居</button>
        <button class="btn btn-sm" onclick="depFocusSelected()">🎯 聚焦</button>
      </div>
    </div>
  </aside>

  <script>
    function toggleSide() {
      const side = document.getElementById("fs-side");
      const canvas = document.getElementById("dep-canvas");
      side.classList.toggle("collapsed");
      canvas.classList.toggle("expanded");
      // vis-network 要 redraw 適應新尺寸
      setTimeout(function(){ if (window._dep_network) window._dep_network.redraw(); window._dep_network.fit(); }, 200);
    }

    // 採集觸發 (Stage 3)
    async function depTriggerCollect() {
      const btn = document.getElementById("dep-collect-btn");
      if (!btn) return;
      btn.disabled = true;
      const orig = btn.innerHTML;
      btn.innerHTML = "⏳ 採集中...";
      try {
        const r = await fetch("/api/dependencies/collect/trigger", { method: "POST", credentials: "include" });
        const res = await r.json();
        if (!res.success) {
          alert("採集失敗: " + (res.error || ""));
          btn.disabled = false; btn.innerHTML = orig;
          return;
        }
        // poll status
        const runId = res.data.run_id;
        let polls = 0;
        const timer = setInterval(async function() {
          polls++;
          const s = await fetch("/api/dependencies/collect/status/" + runId, { credentials: "include" }).then(x => x.json());
          if (s.success && s.data && (s.data.status === "success" || s.data.status === "failed")) {
            clearInterval(timer);
            btn.disabled = false; btn.innerHTML = orig;
            if (s.data.status === "success") {
              const m = s.data;
              alert("✓ 採集完成\n新增邊: " + m.edges_added + " / 更新: " + m.edges_updated + (m.new_unknowns && m.new_unknowns.length ? "\n新發現未知 IP: " + m.new_unknowns.join(", ") : ""));
              depReload();
            } else {
              alert("✗ 採集失敗: " + (m.error || ""));
            }
          } else if (polls > 60) {
            clearInterval(timer);
            btn.disabled = false; btn.innerHTML = orig;
            alert("採集超過 5 分鐘未完成,請看背景 log");
          }
        }, 5000);
      } catch (e) {
        alert("採集失敗: " + e.message);
        btn.disabled = false; btn.innerHTML = orig;
      }
    }
    window.depTriggerCollect = depTriggerCollect;
  </script>

  <script src="https://cdn.jsdelivr.net/npm/vis-network@9/dist/vis-network.min.js?v={{ APP_VER }}"></script>
  <script src="/static/js/dependencies.js?v={{ APP_VER }}"></script>
</body>
</html>
