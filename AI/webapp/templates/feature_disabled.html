{% extends "base.html" %}
{% block title %}模組未開通 - IT 監控系統{% endblock %}
{% block content %}
<div style="text-align:center;padding:60px 20px;max-width:560px;margin:40px auto;">
  <div style="font-size:72px;margin-bottom:20px;">🔒</div>
  <h2 style="color:var(--c2);margin-bottom:12px;">「{{ module_name }}」模組未開通</h2>
  <p style="color:var(--c3);font-size:14px;line-height:1.6;margin-bottom:24px;">
    此功能模組目前處於關閉狀態。<br>
    {% if description %}
    <span style="font-size:12px;color:var(--c4);">{{ description }}</span><br>
    {% endif %}
  </p>
  <div style="background:#fff8e1;border-left:3px solid var(--orange);padding:12px 16px;border-radius:4px;text-align:left;font-size:13px;color:var(--c2);margin-bottom:24px;">
    要啟用此模組，請聯絡系統管理員到「開發後台 → 模組管理」開啟。
  </div>
  <a href="/" class="btn" style="background:var(--g1);color:white;text-decoration:none;padding:10px 20px;border-radius:6px;">回到首頁</a>
</div>
{% endblock %}
