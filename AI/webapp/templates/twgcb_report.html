{% extends "base.html" %}
{% block title %}TWGCB 合規報表{% endblock %}
{% block content %}
<div style="margin-bottom:12px;">
  <a href="/twgcb" style="color:var(--g2);text-decoration:none;">&larr; 返回 TWGCB 合規報告</a>
</div>
<div class="no-print" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
  <h1>TWGCB 合規報表</h1>
  <div style="display:flex;gap:10px;">
    <button class="btn btn-primary" onclick="window.print()">列印 / 匯出 PDF</button>
  </div>
</div>

<!-- 可列印的報表 -->
<div id="reportArea">
  <div id="reportContent" style="padding:20px;">載入中...</div>
</div>

<style>
.btn { padding:8px 18px; border:none; border-radius:6px; cursor:pointer; font-size:13px; font-weight:600; }
.btn-primary { background:var(--g1); color:white; }
.btn-primary:hover { background:var(--g2); }

/* 報表樣式 */
.report-container { background:white; padding:40px; max-width:1200px; margin:0 auto; font-family:'Noto Sans TC',sans-serif; }
.report-header { text-align:center; border-bottom:3px solid #2E7D32; padding-bottom:20px; margin-bottom:24px; }
.report-logo { font-size:32px; font-weight:900; color:#2E7D32; letter-spacing:4px; }
.report-logo-sub { font-size:14px; color:#666; margin-top:4px; letter-spacing:2px; }
.report-title { font-size:22px; font-weight:700; margin-top:16px; color:#333; }
.report-date { font-size:13px; color:#888; margin-top:8px; }
.report-meta { display:flex; justify-content:space-between; margin-bottom:20px; font-size:13px; }
.sign-table { width:100%; border-collapse:collapse; margin-top:30px; }
.sign-table th, .sign-table td { border:1px solid #ccc; padding:10px 16px; text-align:center; }
.sign-table th { background:#f5f5f5; font-size:13px; color:#666; width:25%; }
.sign-table td { height:60px; font-size:14px; }

/* 燈號矩陣 */
.matrix-table { width:100%; border-collapse:collapse; font-size:12px; margin-top:16px; }
.matrix-table th { padding:6px 4px; text-align:center; border:1px solid #ddd; background:#f8f8f8; font-size:11px; white-space:nowrap; }
.matrix-table th.cat-header { background:#E8F5E9; color:#2E7D32; font-size:12px; font-weight:700; }
.matrix-table td { padding:6px 4px; text-align:center; border:1px solid #ddd; }
.matrix-table td.host-cell { text-align:left; font-weight:600; font-size:12px; white-space:nowrap; padding-left:8px; }
.matrix-table tr:hover { background:#fafafa; }
.light { display:inline-block; width:18px; height:18px; border-radius:50%; }
.light-pass { background:#4CAF50; box-shadow:0 0 4px rgba(76,175,80,0.4); }
.light-fail { background:#F44336; box-shadow:0 0 4px rgba(244,67,54,0.4); }
.light-exception { background:#FF9800; box-shadow:0 0 4px rgba(255,152,0,0.4); }
.light-na { background:#e0e0e0; }
.rate-cell { font-family:'JetBrains Mono',monospace; font-weight:700; font-size:12px; }
.summary-row { display:flex; gap:24px; margin:16px 0; flex-wrap:wrap; }
.summary-item { display:flex; align-items:center; gap:6px; font-size:13px; }
.legend { display:flex; gap:20px; margin:12px 0; font-size:12px; color:#666; align-items:center; }
.legend .light { width:14px; height:14px; }

/* 列印樣式 */
@media print {
  .no-print { display:none !important; }
  nav, .nav-bar, header { display:none !important; }
  body { background:white; margin:0; }
  .report-container { box-shadow:none; padding:20px; }
  .matrix-table { font-size:10px; }
  .matrix-table th, .matrix-table td { padding:4px 2px; }
  .light { width:14px; height:14px; }
  @page { size:landscape; margin:10mm; }
}
</style>

<script>
document.addEventListener('DOMContentLoaded', loadReport);

async function loadReport() {
  try {
    const res = await fetch('/api/twgcb/report');
    const json = await res.json();
    if (!json.success) { document.getElementById('reportContent').innerHTML = '載入失敗'; return; }
    renderReport(json.data);
  } catch(e) {
    document.getElementById('reportContent').innerHTML = '載入失敗: ' + e.message;
  }
}

function renderReport(d) {
  const checks = d.enabled_checks || [];
  const matrix = d.matrix || [];
  const cats = d.categories || {};

  // 統計
  const totalPass = matrix.reduce((s,r) => s + r.passed, 0);
  const totalFail = matrix.reduce((s,r) => s + r.failed, 0);
  const totalAll = totalPass + totalFail;
  const overallRate = totalAll > 0 ? Math.round(totalPass/totalAll*100) : 0;

  let html = `<div class="report-container">
    <!-- 報表抬頭 -->
    <div class="report-header">
      <div class="report-logo"><img src='/static/img/example_logo_report.png' style='height:50px;margin-bottom:8px;'><br>${d.company_name || 'Example Corp'}</div>
      <div class="report-logo-sub">EXAMPLE SECURITIES</div>
      <div class="report-title">TWGCB 政府組態基準合規檢查報告</div>
      <div class="report-date">報告日期：${d.report_date} | 檢查項目：${checks.length} 項 | 受檢主機：${matrix.length} 台</div>
    </div>

    <!-- 摘要 -->
    <div class="report-meta">
      <div>部門：${d.department || '-'}</div>
      <div>整體合規率：<strong style="font-size:18px;color:${overallRate>=80?'#4CAF50':overallRate>=50?'#FF9800':'#F44336'}">${overallRate}%</strong></div>
    </div>

    <div class="summary-row">
      <div class="summary-item"><span class="light light-pass"></span> 通過 ${totalPass}</div>
      <div class="summary-item"><span class="light light-fail"></span> 未通過 ${totalFail}</div>
      <div class="summary-item"><span class="light light-na"></span> 總檢查點 ${totalAll}</div>
    </div>

    <div class="legend">
      圖例：
      <span class="light light-pass"></span> 合規
      <span class="light light-fail"></span> 不合規
      <span class="light light-exception"></span> 例外處理
      <span class="light light-na"></span> 不適用
    </div>

    <!-- 燈號矩陣表格 -->
    <table class="matrix-table">
      <thead>
        <tr>
          <th rowspan="2" style="min-width:100px;">主機</th>
          <th rowspan="2">OS</th>`;

  // 分類標題列
  const catNames = Object.keys(cats);
  catNames.forEach(cat => {
    html += `<th class="cat-header" colspan="${cats[cat].length}">${cat}</th>`;
  });
  html += `<th rowspan="2">合規率</th></tr><tr>`;

  // 檢查項標題列
  catNames.forEach(cat => {
    cats[cat].forEach(c => {
      html += `<th title="${c.name}" style="writing-mode:vertical-lr;text-orientation:mixed;min-height:60px;font-size:10px;">${c.check_id}<br>${c.name.substring(0,6)}</th>`;
    });
  });
  html += '</tr></thead><tbody>';

  // 主機資料列
  matrix.forEach(row => {
    const rateColor = row.rate>=80?'#4CAF50':row.rate>=50?'#FF9800':'#F44336';
    html += `<tr>
      <td class="host-cell">${row.hostname}</td>
      <td style="font-size:11px;">${row.os}</td>`;

    catNames.forEach(cat => {
      cats[cat].forEach(c => {
        const check = row.checks[c.check_id];
        if (!check) {
          html += '<td><span class="light light-na"></span></td>';
        } else if (check.status === 'pass') {
          html += '<td><span class="light light-pass" title="PASS"></span></td>';
        } else if (check.status === 'exception') {
          html += '<td><span class="light light-exception" title="例外"></span></td>';
        } else {
          html += `<td><span class="light light-fail" title="FAIL: ${check.actual||''}"></span></td>`;
        }
      });
    });

    html += `<td class="rate-cell" style="color:${rateColor}">${row.rate}%</td></tr>`;
  });

  html += '</tbody></table>';

  // 簽核欄
  html += `
    <table class="sign-table">
      <tr>
        <th>承辦人</th><th>科長</th><th>部長</th><th>備註</th>
      </tr>
      <tr>
        <td>${d.handler || ''}</td>
        <td>${d.section_chief || ''}</td>
        <td>${d.director || ''}</td>
        <td></td>
      </tr>
    </table>
  </div>`;

  document.getElementById('reportContent').innerHTML = html;
}
</script>
{% endblock %}
