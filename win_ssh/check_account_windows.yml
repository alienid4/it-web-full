# check_account/tasks/windows.yml
# Windows 帳號稽核 via SSH + PowerShell

- name: Windows - Get local users
  raw: 'powershell -Command "Get-LocalUser | Select-Object Name, Enabled | ConvertTo-Json"'
  register: win_users_raw
  changed_when: false

- name: Windows - Get admin members
  raw: 'powershell -Command "try{Get-LocalGroupMember -Group ''Administrators'' -EA Stop | Select-Object Name, ObjectClass | ConvertTo-Json}catch{''[]''}"'
  register: win_admins_raw
  changed_when: false
  ignore_errors: yes

- name: Windows - Parse users
  set_fact:
    _win_users_raw: "{{ win_users_raw.stdout | trim | from_json }}"
    _win_admins_raw: "{{ (win_admins_raw.stdout | trim | from_json) if win_admins_raw is succeeded and win_admins_raw.stdout | trim != '' else [] }}"

- name: Windows - Normalize
  set_fact:
    _win_users: "{{ [_win_users_raw] if _win_users_raw is mapping else _win_users_raw }}"
    _win_admins: "{{ [_win_admins_raw] if _win_admins_raw is mapping else _win_admins_raw }}"

- name: Windows - Load previous snapshot
  slurp:
    src: "{{ account_snapshot_dir }}/{{ inventory_hostname }}_accounts.json"
  register: prev_snapshot
  delegate_to: localhost
  ignore_errors: yes

- name: Windows - Calc diff
  set_fact:
    _current_names: "{{ _win_users | map(attribute='Name') | list }}"
    _prev_names: "{{ ((prev_snapshot.content | b64decode | from_json) | map(attribute='Name') | list) if prev_snapshot is succeeded else [] }}"

- name: Windows - Set account result
  set_fact:
    account_result:
      status: >-
        {{ 'warn' if (_current_names | difference(_prev_names) | length > 0) or (_prev_names | difference(_current_names) | length > 0)
           else 'ok' }}
      total_accounts: "{{ _win_users | length }}"
      accounts_added: "{{ _current_names | difference(_prev_names) }}"
      accounts_removed: "{{ _prev_names | difference(_current_names) }}"
      admin_members: "{{ _win_admins | map(attribute='Name') | default([]) | list }}"
      uid0_alert: false
      note: ""

- name: Windows - Save snapshot
  copy:
    content: "{{ _win_users | to_nice_json }}"
    dest: "{{ account_snapshot_dir }}/{{ inventory_hostname }}_accounts.json"
  delegate_to: localhost
