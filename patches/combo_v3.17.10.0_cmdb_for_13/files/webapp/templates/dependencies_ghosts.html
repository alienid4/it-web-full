{% extends "base.html" %}
{% block title %}Ghost 分析 - 系統聯通圖{% endblock %}
{% block content %}
<div class="dep-page">
  <div class="card" style="margin-bottom:12px;">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;">
      <h2 style="margin:0;font-size:18px;">👻 Ghost 分析 — 未納管對端 IP</h2>
      <div style="display:flex;gap:8px;">
        <a href="/dependencies" class="btn">← 回拓撲圖</a>
        <button class="btn btn-primary" onclick="ghostReload()">🔄 重新分析</button>
      </div>
    </div>
    <div style="font-size:12px;color:var(--c3);margin-top:6px;">
      說明: 採集到的對端 IP 中,扣掉 <b>hosts collection</b> 已納管 + <b>KNOWN_EXTERNAL</b> 已分類後,剩下的「不明連線對端」。
      內網 ghost 通常是 <b>shadow IT</b> (沒納管的主機),外網 ghost 是 <b>未審查的雲服務 / 第三方 API</b>。
    </div>
  </div>

  <div class="kpi-grid" id="ghost-kpi" style="margin-bottom:12px;"></div>

  <div class="card">
    <div style="display:flex;gap:12px;align-items:center;margin-bottom:8px;flex-wrap:wrap;">
      <input type="text" id="ghost-search" placeholder="🔍 搜尋 IP / Caller / Process" oninput="ghostFilter()" style="padding:6px 12px;border:1px solid #d8d8d8;border-radius:16px;font-size:13px;width:280px;outline:none;">
      <select id="ghost-sev-filter" onchange="ghostFilter()" style="padding:5px 10px;border:1px solid #d8d8d8;border-radius:8px;font-size:13px;">
        <option value="">全部嚴重度</option>
        <option value="high">🔴 高 (內網未納管)</option>
        <option value="medium">🟡 中 (公網未審查)</option>
        <option value="low">⚪ 低</option>
      </select>
      <span id="ghost-meta" style="margin-left:auto;font-size:12px;color:var(--c4);font-family:JetBrains Mono,monospace;"></span>
    </div>
    <div id="ghost-table">載入中...</div>
  </div>

  <!-- 動作 Modal -->
  <div class="modal-overlay" id="ghost-action-modal">
    <div class="modal" style="max-width:520px;">
      <div class="modal-title" id="ghost-modal-title">處理 Ghost</div>
      <div id="ghost-modal-body"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
        <button class="btn" onclick="document.getElementById('ghost-action-modal').classList.remove('active')">取消</button>
        <button class="btn btn-primary" id="ghost-modal-submit">執行</button>
      </div>
    </div>
  </div>
</div>

<script>
let _ghosts = [];

function ghostReload() {
  document.getElementById("ghost-table").innerHTML = "載入中...";
  fetch("/api/dependencies/ghosts", { credentials: "include" })
    .then(r => r.json())
    .then(res => {
      if (!res.success) {
        document.getElementById("ghost-table").innerHTML = '<span style="color:var(--red);">載入失敗</span>';
        return;
      }
      _ghosts = res.data || [];
      renderKPI(res.summary || {});
      ghostFilter();
    });
}

function renderKPI(s) {
  const kpi = document.getElementById("ghost-kpi");
  kpi.className = "admin-kpi";
  kpi.innerHTML =
    '<div class="admin-kpi-item"><div class="admin-kpi-value" style="color:var(--red);">' + (s.high||0) + '</div><div class="admin-kpi-label">🔴 內網未納管 (Shadow IT)</div></div>' +
    '<div class="admin-kpi-item"><div class="admin-kpi-value" style="color:var(--orange);">' + (s.medium||0) + '</div><div class="admin-kpi-label">🟡 公網未審查</div></div>' +
    '<div class="admin-kpi-item"><div class="admin-kpi-value">' + (s.total||0) + '</div><div class="admin-kpi-label">總 Ghost</div></div>';
}

function ghostFilter() {
  const kw = (document.getElementById("ghost-search").value || "").trim().toLowerCase();
  const sev = document.getElementById("ghost-sev-filter").value;
  const filtered = _ghosts.filter(g => {
    if (sev && g.severity !== sev) return false;
    if (!kw) return true;
    const blob = (g.ip + " " + (g.callers||[]).join(" ") + " " + (g.processes||[]).join(" ") + " " + (g.to_system||"")).toLowerCase();
    return blob.indexOf(kw) >= 0;
  });
  document.getElementById("ghost-meta").textContent = "顯示 " + filtered.length + " / " + _ghosts.length + " 筆";

  if (!filtered.length) {
    document.getElementById("ghost-table").innerHTML = '<div style="padding:40px;text-align:center;color:var(--c3);">沒有符合條件的 ghost,環境很乾淨 ✓</div>';
    return;
  }

  const sevBadge = { high: '<span style="background:var(--red);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;">高</span>', medium: '<span style="background:var(--orange);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;">中</span>', low: '<span style="background:var(--c4);color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;">低</span>' };
  const classLabel = { private_unmanaged: "內網未納管", public_unknown: "公網未審查", other: "其他" };

  let html = '<table class="data-table" style="width:100%;font-size:13px;"><thead><tr>'
    + '<th>嚴重</th><th>IP</th><th>分類</th><th>連線次數</th><th>埠號</th><th>Process</th><th>Caller (採集主機)</th><th>最後看到</th><th style="width:200px;">動作</th>'
    + '</tr></thead><tbody>';
  filtered.forEach(g => {
    const lastSeen = g.last_seen ? new Date(g.last_seen).toLocaleString('zh-TW',{hour12:false}).slice(5) : "—";
    html += '<tr>'
      + '<td>' + (sevBadge[g.severity]||"") + '</td>'
      + '<td><code style="font-weight:600;">' + esc(g.ip) + '</code></td>'
      + '<td>' + esc(classLabel[g.classification]||g.classification) + '</td>'
      + '<td style="text-align:center;">' + g.seen_count + '</td>'
      + '<td>' + (g.ports||[]).join(", ") + '</td>'
      + '<td style="font-size:11px;color:var(--c3);">' + esc((g.processes||[]).join(", ")) + '</td>'
      + '<td style="font-size:11px;">' + esc((g.callers||[]).join(", ")) + '</td>'
      + '<td style="font-size:11px;color:var(--c3);">' + lastSeen + '</td>'
      + '<td>'
        + '<button class="btn btn-sm btn-primary" onclick="openGhostAction(\'' + esc(g.ip) + '\',\'add_host\')">➕ 加入主機</button> '
        + '<button class="btn btn-sm" onclick="openGhostAction(\'' + esc(g.ip) + '\',\'mark_external\')">🌐 標為外部</button> '
        + '<button class="btn btn-sm" onclick="openGhostAction(\'' + esc(g.ip) + '\',\'ignore\')">🔇 忽略</button>'
      + '</td>'
      + '</tr>';
  });
  html += '</tbody></table>';
  document.getElementById("ghost-table").innerHTML = html;
}

function esc(s) { return String(s==null?"":s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function openGhostAction(ip, action) {
  const titles = { add_host: "新增主機到 hosts (從 ghost 升級)", mark_external: "標記為已知外部系統", ignore: "加入忽略清單 (settings)" };
  document.getElementById("ghost-modal-title").textContent = titles[action] + " — " + ip;
  let body = "";
  if (action === "add_host") {
    body = '<div style="display:grid;grid-template-columns:120px 1fr;gap:10px 12px;font-size:13px;">'
      + '<label>IP</label><input value="' + esc(ip) + '" disabled style="padding:6px;border:1px solid #ccc;border-radius:6px;background:#f5f5f5;">'
      + '<label>Hostname</label><input id="ga-hostname" placeholder="unmanaged-' + esc(ip.replace(/\./g,"-")) + '" style="padding:6px;border:1px solid #ccc;border-radius:6px;">'
      + '<label>OS</label><input id="ga-os" placeholder="(可選)" style="padding:6px;border:1px solid #ccc;border-radius:6px;">'
      + '<label>業務系統</label><input id="ga-system" placeholder="(可選)" style="padding:6px;border:1px solid #ccc;border-radius:6px;">'
      + '<label>負責人</label><input id="ga-owner" placeholder="(可選)" style="padding:6px;border:1px solid #ccc;border-radius:6px;">'
      + '</div><div style="margin-top:10px;font-size:11px;color:var(--c3);">注意:這只是把 IP 放進 hosts 清單,不會自動部署巡檢/採集 agent</div>';
  } else if (action === "mark_external") {
    body = '<div style="display:grid;grid-template-columns:120px 1fr;gap:10px 12px;font-size:13px;">'
      + '<label>IP</label><input value="' + esc(ip) + '" disabled style="padding:6px;border:1px solid #ccc;border-radius:6px;background:#f5f5f5;">'
      + '<label>System ID</label><input id="ga-sysid" placeholder="EXT-' + esc(ip.replace(/\./g,"-")) + '" style="padding:6px;border:1px solid #ccc;border-radius:6px;">'
      + '<label>顯示名稱</label><input id="ga-display" placeholder="例: 外部 API 服務" style="padding:6px;border:1px solid #ccc;border-radius:6px;">'
      + '<label>CIDR (擴展)</label><input id="ga-cidr" placeholder="' + esc(ip) + '/32 或 ' + esc(ip.split(".").slice(0,2).join(".")) + '.0.0/16" style="padding:6px;border:1px solid #ccc;border-radius:6px;">'
      + '<label>說明</label><textarea id="ga-desc" rows="2" placeholder="(可選)" style="padding:6px;border:1px solid #ccc;border-radius:6px;font-family:inherit;"></textarea>'
      + '</div><div style="margin-top:10px;font-size:11px;color:var(--c3);">標記後該 IP/CIDR 不會再列為 ghost,並把現有 UNKNOWN-' + esc(ip) + ' 的邊轉指過來</div>';
  } else {
    body = '<div style="font-size:13px;line-height:1.6;">'
      + '把 <code>' + esc(ip) + '</code> 加進 settings.dependency_ghost_ignore 白名單,下次分析就不會列出來。<br>'
      + '<span style="color:var(--c3);font-size:11px;">適合處理「短暫干擾 IP」(例:出差員工 VPN 進來)</span>'
      + '</div>';
  }
  document.getElementById("ghost-modal-body").innerHTML = body;
  document.getElementById("ghost-modal-submit").onclick = function() { submitGhostAction(ip, action); };
  document.getElementById("ghost-action-modal").classList.add("active");
}

async function submitGhostAction(ip, action) {
  let payload = { action: action };
  if (action === "add_host") {
    payload.hostname = (document.getElementById("ga-hostname").value || "").trim();
    payload.os = (document.getElementById("ga-os").value || "").trim();
    payload.system_name = (document.getElementById("ga-system").value || "").trim();
    payload.owner = (document.getElementById("ga-owner").value || "").trim();
  } else if (action === "mark_external") {
    payload.system_id = (document.getElementById("ga-sysid").value || "").trim().toUpperCase();
    payload.display_name = (document.getElementById("ga-display").value || "").trim();
    payload.cidr = (document.getElementById("ga-cidr").value || "").trim();
    payload.description = (document.getElementById("ga-desc").value || "").trim();
  }
  try {
    const r = await fetch("/api/dependencies/ghosts/" + encodeURIComponent(ip) + "/adopt", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      credentials: "include",
      body: JSON.stringify(payload),
    });
    const res = await r.json();
    if (!res.success) {
      alert("✗ " + (res.error || "失敗"));
      return;
    }
    if (typeof _dashToast === "function") _dashToast("✓ 已處理", "success");
    document.getElementById("ghost-action-modal").classList.remove("active");
    ghostReload();
  } catch (e) {
    alert("✗ " + e.message);
  }
}

document.addEventListener("DOMContentLoaded", ghostReload);
</script>
{% endblock %}
