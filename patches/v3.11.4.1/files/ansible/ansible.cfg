[defaults]
# v3.11.4.1: 修 collect_packages.yml / twgcb_scan.yml 等 playbook 找不到 role 的問題
# ansible-playbook 的 cwd 是 /opt/inspection/ansible/（由 run_inspection.sh cd 進來）
# 所以 roles 可用相對路徑
roles_path = ./roles
inventory = ./inventory/hosts.yml
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml
forks = 10
timeout = 30
# 關閉 deprecation warning 避免 log 雜訊
deprecation_warnings = False

[ssh_connection]
# 加速 SSH 連線（local connection 不影響）
pipelining = True
control_path = /tmp/ansible-%%h-%%p-%%r
