---
# 效能採樣 (nmon) - Linux
# 1) 裝 nmon (只做一次, 冪等)
# 2) 建 /var/log/nmon 目錄
# 3) 下 cron: 每天 00:00 跑 nmon -f -t -s 60 -c 1440 (每 60 秒採樣 x 1440 次 = 24 小時)
# 4) fetch 最近 2 天 .nmon 檔到 secansible

- name: "nmon - detect pkg mgr"
  shell: |
    if command -v apt-get >/dev/null 2>&1; then echo apt
    elif command -v dnf >/dev/null 2>&1; then echo dnf
    elif command -v yum >/dev/null 2>&1; then echo yum
    else echo unknown
    fi
  register: nmon_pkgmgr
  changed_when: false
  become: true

- name: "nmon - install on Debian/Ubuntu"
  apt:
    name: nmon
    state: present
    update_cache: yes
  when: nmon_pkgmgr.stdout == "apt"
  become: true
  ignore_errors: true

- name: "nmon - ensure EPEL on RHEL/Rocky (for nmon package)"
  shell: "dnf install -y epel-release 2>&1 || yum install -y epel-release 2>&1 || true"
  when: nmon_pkgmgr.stdout in ["dnf","yum"]
  changed_when: false
  become: true
  ignore_errors: true

- name: "nmon - install on RHEL/Rocky"
  shell: "dnf install -y nmon 2>&1 || yum install -y nmon 2>&1"
  when: nmon_pkgmgr.stdout in ["dnf","yum"]
  register: nmon_install
  changed_when: "'Installed' in nmon_install.stdout"
  become: true
  ignore_errors: true

- name: "nmon - verify binary"
  shell: "command -v nmon || command -v topas_nmon"
  register: nmon_bin
  changed_when: false
  become: true
  ignore_errors: true

- name: "nmon - create log dirs (daily + monthly)"
  file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /var/log/nmon
    - /var/log/nmon/daily
    - /var/log/nmon/monthly
  become: true

# IBM-recommended fixed schedules (v3.17.15.0 - no user-configurable interval)
# daily/weekly monitoring: 60s x 1440 = 24h  (optimal for day/week analysis)
# monthly capacity:       900s x  96 = 24h  (15-min interval for capacity planning)
- name: "nmon - remove legacy variable-interval crons"
  cron:
    name: "{{ item }}"
    state: absent
    user: root
  loop:
    - "nmon daily snapshot (collect_nmon)"
    - "nmon sampling (collect_nmon)"
  become: true
  ignore_errors: true

- name: "nmon - cron: daily/weekly monitoring (IBM 60s x 1440 = 24h)"
  cron:
    name: "nmon daily monitoring (collect_nmon)"
    minute: "0"
    hour: "0"
    job: "{{ nmon_bin.stdout | trim }} -f -t -s 60 -c 1440 -m /var/log/nmon/daily >/dev/null 2>&1"
    state: present
    user: root
  when: nmon_bin.stdout | default('') | length > 0
  become: true

- name: "nmon - cron: monthly capacity (IBM 900s x 96 = 24h)"
  cron:
    name: "nmon monthly capacity (collect_nmon)"
    minute: "0"
    hour: "0"
    job: "{{ nmon_bin.stdout | trim }} -f -t -s 900 -c 96 -m /var/log/nmon/monthly >/dev/null 2>&1"
    state: present
    user: root
  when: nmon_bin.stdout | default('') | length > 0
  become: true

- name: "nmon - list recent daily .nmon files (last 2 days)"
  shell: "find /var/log/nmon/daily -maxdepth 1 -name '*.nmon' -mtime -2 -type f 2>/dev/null | sort"
  register: nmon_files_daily
  changed_when: false
  become: true

- name: "nmon - list recent monthly .nmon files (last 35 days)"
  shell: "find /var/log/nmon/monthly -maxdepth 1 -name '*.nmon' -mtime -35 -type f 2>/dev/null | sort"
  register: nmon_files_monthly
  changed_when: false
  become: true

- name: "nmon - fetch daily .nmon files to control node"
  fetch:
    src: "{{ item }}"
    dest: "/seclog/AI/inspection/data/nmon/daily/{{ inventory_hostname }}/"
    flat: yes
  loop: "{{ nmon_files_daily.stdout_lines | default([]) }}"
  when: nmon_files_daily.stdout_lines | default([]) | length > 0
  become: true

- name: "nmon - fetch monthly .nmon files to control node"
  fetch:
    src: "{{ item }}"
    dest: "/seclog/AI/inspection/data/nmon/monthly/{{ inventory_hostname }}/"
    flat: yes
  loop: "{{ nmon_files_monthly.stdout_lines | default([]) }}"
  when: nmon_files_monthly.stdout_lines | default([]) | length > 0
  become: true

- name: "nmon - collection summary"
  debug:
    msg: "{{ inventory_hostname }}: nmon={{ nmon_bin.stdout | default('NOT-INSTALLED') | trim }}, daily={{ nmon_files_daily.stdout_lines | default([]) | length }}, monthly={{ nmon_files_monthly.stdout_lines | default([]) | length }}"
