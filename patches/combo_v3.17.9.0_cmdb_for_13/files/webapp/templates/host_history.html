{% extends "base.html" %}
{% block title %}{{ hostname }} 變更歷史 - IT 監控系統{% endblock %}

{% block head %}
<style>
.hh-wrap { max-width: 1100px; margin: 24px auto; padding: 0 24px; }
.hh-header {
  position: sticky; top: 0; z-index: 50; background: #fff;
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 24px; border-bottom: 2px solid #eee; margin-bottom: 24px;
}
.hh-header h2 { margin: 0; color: var(--g1); }
.hh-empty { color: #6b7280; padding: 30px; text-align: center; background: #fff; border-radius: 10px; }
.hh-item {
  background: #fff; border-left: 4px solid var(--g1); border-radius: 8px;
  padding: 14px 18px; margin-bottom: 12px;
}
.hh-item.create { border-left-color: #10b981; }
.hh-item.update { border-left-color: #3b82f6; }
.hh-item.delete { border-left-color: #ef4444; }
.hh-item.merge  { border-left-color: #a855f7; }
.hh-item-head {
  display: flex; gap: 12px; align-items: center; margin-bottom: 6px;
}
.hh-action {
  display: inline-block; padding: 2px 10px; border-radius: 12px;
  font-size: 12px; color: #fff; font-weight: 600;
}
.hh-action.create { background: #10b981; }
.hh-action.update { background: #3b82f6; }
.hh-action.delete { background: #ef4444; }
.hh-action.merge  { background: #a855f7; }
.hh-when { color: #6b7280; font-size: 12px; font-family: monospace; }
.hh-who  { font-weight: 600; color: var(--g1); }
.hh-detail { color: #4b5563; font-size: 13px; padding: 4px 0; }
.hh-changes {
  background: #f9fafb; border-radius: 6px; padding: 8px 12px; margin-top: 6px;
  font-size: 12px;
}
.hh-changes table { width: 100%; border-collapse: collapse; }
.hh-changes th { text-align: left; color: #6b7280; padding: 4px 8px; font-weight: 600; }
.hh-changes td { padding: 4px 8px; border-top: 1px solid #e5e7eb; vertical-align: top; }
.hh-changes .field { font-weight: 600; color: #1f2937; width: 140px; }
.hh-changes .before { color: #ef4444; text-decoration: line-through; }
.hh-changes .after  { color: #10b981; }
</style>
{% endblock %}

{% block content %}
<div class="hh-header">
  <h2>📜 {{ hostname }} 變更歷史</h2>
  <div>
    <a class="btn" style="background:var(--g2);color:#fff;text-decoration:none;" href="/admin/host-edit/{{ hostname }}" target="_blank">📝 編輯</a>
    <button class="btn" style="background:#999;" onclick="window.close()">關閉</button>
  </div>
</div>

<div class="hh-wrap">
  <div id="hh-list">
    <div class="hh-empty">載入中...</div>
  </div>
</div>

<script>
const HH_HOSTNAME = {{ hostname|tojson }};

async function loadHistory() {
  try {
    const r = await fetch("/api/admin/hosts/" + encodeURIComponent(HH_HOSTNAME) + "/history", { credentials: "include" });
    const res = await r.json();
    if (!res.success) {
      document.getElementById("hh-list").innerHTML = '<div class="hh-empty">載入失敗: ' + (res.error || "") + '</div>';
      return;
    }
    render(res.history || []);
  } catch (e) {
    document.getElementById("hh-list").innerHTML = '<div class="hh-empty">網路錯誤: ' + e.message + '</div>';
  }
}

function render(items) {
  const c = document.getElementById("hh-list");
  if (!items.length) {
    c.innerHTML = '<div class="hh-empty">📭 還沒有變更紀錄</div>';
    return;
  }
  let html = "";
  items.forEach(it => {
    const cls = it.action || "update";
    const changesHTML = (it.before && it.after) ? buildDiffTable(it.before, it.after) : "";
    html += `<div class="hh-item ${cls}">
      <div class="hh-item-head">
        <span class="hh-action ${cls}">${escapeHtml(actionLabel(it.action))}</span>
        <span class="hh-who">${escapeHtml(it.who || "unknown")}</span>
        <span class="hh-when">${escapeHtml(it.when || "")}</span>
      </div>
      ${it.detail ? `<div class="hh-detail">${escapeHtml(it.detail)}</div>` : ""}
      ${changesHTML}
    </div>`;
  });
  c.innerHTML = html;
}

function actionLabel(a) {
  return ({"create":"建立","update":"更新","delete":"刪除","merge":"合併","scan":"掃描"})[a] || a;
}

function buildDiffTable(before, after) {
  const keys = new Set([...Object.keys(before || {}), ...Object.keys(after || {})]);
  const rows = [];
  keys.forEach(k => {
    if (k.startsWith("_") || ["updated_at","imported_at"].includes(k)) return;
    const b = before ? before[k] : undefined;
    const a = after  ? after[k]  : undefined;
    if (JSON.stringify(b) !== JSON.stringify(a)) {
      rows.push({ field: k, b, a });
    }
  });
  if (!rows.length) return "";
  let html = '<div class="hh-changes"><table>';
  rows.forEach(r => {
    html += `<tr>
      <td class="field">${escapeHtml(r.field)}</td>
      <td class="before">${escapeHtml(fmt(r.b))}</td>
      <td>→</td>
      <td class="after">${escapeHtml(fmt(r.a))}</td>
    </tr>`;
  });
  html += '</table></div>';
  return html;
}

function fmt(v) {
  if (v == null) return "(空)";
  if (typeof v === "object") return JSON.stringify(v);
  return String(v);
}

function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}

document.addEventListener("DOMContentLoaded", loadHistory);
</script>
{% endblock %}
